<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* CSS: Design and Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            transition: all 0.5s ease;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        #user-info {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffd700; /* Gold color for name */
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: inline-block;
            margin-top: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="greeting">Welcome!</h1>
        <p id="sub-text">Please wait a moment...</p>
        <div id="user-info"></div>
    </div>

    <script>
        // JS: Google One-Tap Logic
        
        window.onload = function () {
            google.accounts.id.initialize({
                // YAHAN APNI CLIENT ID DAALEIN
                client_id: "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });

            // One-tap popup dikhane ke liye
            google.accounts.id.prompt((notification) => {
                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                    document.getElementById('sub-text').innerText = "Click the Google prompt to personalize this page!";
                }
            });
        };

        function handleCredentialResponse(response) {
            // Google se mila data decode karein
            const responsePayload = parseJwt(response.credential);

            const fullName = responsePayload.name; // User ka naam
            const firstName = responsePayload.given_name; // Sirf pehla naam

            // UI Update karein
            document.getElementById('greeting').innerText = `Hello ${firstName}!`;
            document.getElementById('sub-text').innerText = "Hope you are doing well today.";
            document.getElementById('user-info').innerText = `Welcome to our site, ${fullName}.`;
        }

        // Token decode karne ka standard function
        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        };
    </script>

</body>
</html>
