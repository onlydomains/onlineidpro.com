<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain for Sale</title>
    <style>
        /* CSS: Modern & Clean Design */
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .badge {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; word-break: break-all; color: var(--primary-color); }
        p { color: #64748b; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        .btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.9; }

        footer { margin-top: 20px; font-size: 12px; color: #94a3b8; }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .card { padding: 25px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">Available for Purchase</div>
    <h1 id="domainName">Loading...</h1>
    <p>This premium domain is for sale. Interested? Submit your offer below.</p>

    <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="John Doe">
    </div>

    <div class="form-group">
        <label>Offer Amount (USD)</label>
        <input type="number" id="offerPrice" placeholder="e.g. 500">
    </div>

    <button class="btn" onclick="sendEmail()">Send Offer via Email</button>

    <footer>
        Contact: honey@vadhwa.com
    </footer>
</div>

<script>
    // JS: Get current domain and set it in the heading
    const currentDomain = window.location.hostname;
    document.getElementById('domainName').innerText = currentDomain;

    function sendEmail() {
        const name = document.getElementById('userName').value;
        const price = document.getElementById('offerPrice').value;
        const emailTo = "honey@vadhwa.com";
        
        if(!name || !price) {
            alert("Please fill in your name and offer price.");
            return;
        }

        // Email Subject & Body
        const subject = encodeURIComponent(`Inquiry for Domain: ${currentDomain}`);
        const body = encodeURIComponent(
            `Hello Honey,\n\n` +
            `I am interested in purchasing the domain: ${currentDomain}\n` +
            `My Name: ${name}\n` +
            `My Offer: $${price}\n\n` +
            `Please let me know your thoughts.\n` +
            `Regards,\n${name}`
        );

        // mailto link triggers the user's email app
        window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
    }
</script>

</body>
</html>
